services:
  # Backend API Service
  - type: web
    name: woodcarvings-api
    runtime: python
    plan: free  # Change to 'starter' or higher for production
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard
      - key: VERTEX_PROJECT_ID
        sync: false
      - key: VERTEX_LOCATION
        sync: false
      - key: VERTEX_API_KEY
        sync: false
      - key: DROPBOX_SHARED_FOLDER_LINK
        sync: false
      - key: FRONTEND_URL
        value: https://woodcarvings-frontend.onrender.com  # Update with actual frontend URL
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: woodcarvings-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://woodcarvings-api.onrender.com  # Update with actual backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    autoDeploy: true
